<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Agromulti</title>

<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="fotos/Logo Agro Multi digital em formato favicon.png" type="image/png">


<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* CAMPO SENHA COM OLHO */
.campo-senha{
position:relative;
width:100%;
}

.campo-senha input{
width:100%;
padding:10px;
padding-right:40px;
box-sizing:border-box;
}

.campo-senha i{
position:absolute;
right:10px;
top:40%;
transform:translateY(-50%);
cursor:pointer;
color:#555;
font-size:18px;
}
i{
  margin-right: 1px;
}

</style>

</head>

<body>
  <button class="btn-voltar" onclick="window.location.href = 'inicio.html'">
<i class="fa-solid fa-arrow-left"></i>
<span>Voltar</span>
</button>
<div class="container">

<div class="login-box">

<img src="fotos/AGRO MULTI original (1).png" class="logo" alt="logo">


<h1>LOGIN</h1>

<form id="formLogin">

<label>Email</label>
<input type="email" name="email" placeholder="Digite seu email" required>

<label>Senha</label>

<div class="campo-senha">

<input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

<i class="fa-solid fa-eye" id="toggleSenha"></i>

</div>

<p class="erro" style="display: none;">Email ou senha incorretos</p>

<div class="captcha-box">
  
  <div class="captcha-left">
    <input type="checkbox" id="naoRobo">
    <label for="naoRobo">Não sou um robô</label>
  </div>

  <div class="captcha-right">
    <div class="captcha-logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/250px-RecaptchaLogo.svg.png" alt="" class="recaptcha">
    </div>
  </div>

</div>

<button type="submit"> <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar</button>

</form>

<div class="links">

<a href="recuperar.html">Esqueceu a senha?</a>

<p>sem conta? 
<a href="cadastro.html">CADASTRE-SE</a>
</p>

</div>

</div>

</div>

<script src="script/login.js"></script>

<script>

/* OLHO DA SENHA */

const senha = document.getElementById("senha");
const olho = document.getElementById("toggleSenha");

olho.addEventListener("click", function(){

if(senha.type === "password"){
senha.type = "text";
olho.classList.remove("fa-eye");
olho.classList.add("fa-eye-slash");
}
else{
senha.type = "password";
olho.classList.remove("fa-eye-slash");
olho.classList.add("fa-eye");
}

});

</script>

</body>
</html>
