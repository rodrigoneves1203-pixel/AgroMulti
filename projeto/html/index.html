<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - AgroMulti</title>

<meta name="description" content="Sistema AgroMulti - plataforma de gestão agrícola para controle de produção, relatórios e monitoramento.">
<meta name="google-site-verification" content="H8g9S6nt40MZKAk16ccdkd__s_GjuAr81DS00Gnk-QI" />

<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="fotos/Logo Agro Multi digital em formato favicon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.campo-senha {
  position: relative;
  width: 100%;
}

.campo-senha input {
  width: 100%;
  padding: 10px;
  padding-right: 40px;
  box-sizing: border-box;
}

.campo-senha i {
  position: absolute;
  right: 10px;
  top: 40%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #555;
  font-size: 18px;
}

.info-sistema {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.info-sistema h2 {
  margin: 0;
}
</style>
</head>

<body>

<div class="container">

<div class="login-box">

<!-- IDENTIDADE DO SISTEMA -->
<div class="info-sistema">
  <img src="fotos/AGRO MULTI original (1).png" class="logo" alt="AgroMulti Logo">
  <h2>AgroMulti</h2>
  <p>Sistema de gestão agrícola para controle de produção e relatórios</p>
</div>

<h1>LOGIN</h1>

<form id="formLogin">

<label>Email</label>
<input type="email" name="email" placeholder="Digite seu email" required>

<label>Senha</label>

<div class="campo-senha">
  <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
  <i class="fa-solid fa-eye" id="toggleSenha"></i>
</div>

<p class="erro" style="display:none;">Email ou senha incorretos</p>

<!-- ❌ REMOVIDO CAPTCHA FAKE (MUITO IMPORTANTE) -->

<button type="submit">
  <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar
</button>

</form>

<div class="links">
  <a href="recuperar.html">Esqueceu a senha?</a>

  <p>Sem conta?
    <a href="cadastro.html">Cadastre-se</a>
  </p>

  <!-- IMPORTANTE PARA GOOGLE TRUST -->
  <div style="margin-top:15px; font-size:12px;">
    <a href="privacy.html">Privacidade</a> |
    <a href="terms.html">Termos</a> |
    <a href="about.html">Sobre</a>
  </div>
</div>

</div>

</div>

<script src="script/login.js"></script>

<script>
const senha = document.getElementById("senha");
const olho = document.getElementById("toggleSenha");

olho.addEventListener("click", function () {
  if (senha.type === "password") {
    senha.type = "text";
    olho.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    senha.type = "password";
    olho.classList.replace("fa-eye-slash", "fa-eye");
  }
});
</script>

</body>
</html>
