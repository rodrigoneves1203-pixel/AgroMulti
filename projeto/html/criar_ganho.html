<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Ganho</title>

<link rel="stylesheet" href="css/formuario_adicionar.css">

<!-- CSS ACESSIBILIDADE -->
<link rel="stylesheet" href="css/acessibilidade.css">
<link rel="stylesheet" href="css/responsividade.css">
<link rel="stylesheet" href="css/padrão.css">
<link rel="icon" href="fotos/Logo Agro Multi digital em formato favicon.png" type="image/png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<button class="btn-voltar" onclick="voltar()" aria-label="Voltar para página anterior">

 <i class="fa-solid fa-arrow-left"></i>
      Voltar
</button>


<main class="pc formulario">

<img src="fotos/AGRO MULTI original (1).png" class="logo1" alt="Logo Agro Multi">

<h1>Adicionar ganhos</h1>
<p>Preencha os dados abaixo</p>

<form onsubmit="adicionarGanho(); return false;">
<label for="data_ganho">Data</label>
<input id="data_ganho" type="date" required>

<label for="nome_ganho">Nome</label>
<input id="nome_ganho" placeholder="Ex: Venda de gado ou venda de milho" required>

<label for="descricao_ganho">Descrição</label>
<input id="descricao_ganho" placeholder="Ex: Venda de 10 bois para frigorífico ou vendi na feira">

<label for="quantidade_ganho">Quantidade</label>
<input id="quantidade_ganho" placeholder="Ex: 10 animais ou 500 kg">

<label for="valor_ganho">Valor</label>
<input id="valor_ganho" type="number" step="0.01" placeholder="Ex: 15000,00">

<button type="submit">
Adicionar ganho
</button>

</form>

</main>


<!-- SCRIPT PRINCIPAL -->
<script src="script/criar_ganho.js"></script>
<script src="script/top_bar/padrao.js"></script>

<!-- SCRIPTS ACESSIBILIDADE -->

<script src="script/script-acessibilidade/injetar-acessibilidade.js"></script>


</body>
</html>
