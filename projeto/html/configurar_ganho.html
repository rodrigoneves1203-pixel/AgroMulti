<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurar Ganho</title>
<link rel="stylesheet" href="css/padrão.css">
<link rel="stylesheet" href="css/configurar_gasto.css">
<link rel="stylesheet" href="css/acessibilidade.css">
<link rel="stylesheet" href="css/responsividade.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="icon"
href="fotos/Logo Agro Multi digital em formato favicon.png"
type="image/png">

</head>

<body>
<button class="btn-voltar"
onclick="voltar()"
aria-label="Voltar para a página anterior">
 <i class="fa-solid fa-arrow-left"></i>
      Voltar

</button>

<main>

<img src="fotos/AGRO MULTI original (1).png"
class="log"
alt="Logo da Agro Multi">

<h1>Editar Ganho</h1>

<p>
Escolha o campo que deseja atualizar
</p>

<label for="data_ganho">Data</label>
<input id="data_ganho" type="date" required>

<label for="nome_ganho">Nome</label>
<input id="nome_ganho" required>

<label for="descricao_ganho">Descrição</label>
<input id="descricao_ganho">

<label for="quantidade_ganho">Quantidade</label>
<input id="quantidade_ganho">

<label for="valor_ganho">Valor</label>
<input id="valor_ganho" type="number" step="0.01">

<button onclick="atualizar()" class="bt">
Salvar alteração
</button>

</main>

<script src="script/configurar_ganho.js">

</script>

<script src="script/top_bar/padrao.js"></script>
<!-- SCRIPT GLOBAL DE ACESSIBILIDADE -->

<script src="script/script-acessibilidade/injetar-acessibilidade.js"></script>

</body>
</html>
